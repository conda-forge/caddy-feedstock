schema_version: 1

context:
  name: caddy
  version: "2.11.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/caddyserver/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
    sha256: ee12f7b5f97308708de5067deebb3d3322fc24f6d54f906a47a0a4e8db799122
    target_directory: src
  - url: https://github.com/caddyserver/xcaddy/archive/refs/tags/v0.3.4.tar.gz
    sha256: 5ff7b73c2601ceaf3fd1b3d92be49244523b9b98ee6127276d54c4df59a73d28
    target_directory: xcaddy

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - caddy version
      - caddy --help

about:
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  summary: Fast and extensible multi-platform HTTP/1-2-3 web server with automatic HTTPS
  homepage: https://caddyserver.com
  repository: https://github.com/caddyserver/${{ name }}

extra:
  recipe-maintainers:
    - pavelzw
